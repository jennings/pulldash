name: CodeQL

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@628fc3f124e68b0151f0d2a5d81e864ee1e42335
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@628fc3f124e68b0151f0d2a5d81e864ee1e42335
        with:
          fail-on: warning
