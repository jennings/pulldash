name: Semgrep

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install semgrep
        run: pip install semgrep
      - name: Scan
        run: semgrep --config p/default --error .
