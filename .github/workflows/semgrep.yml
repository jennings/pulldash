name: Semgrep

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install semgrep
        run: pip install semgrep
      - name: Scan
        run: semgrep --config p/default --error .
