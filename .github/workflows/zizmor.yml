name: Zizmor

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install zizmor
        run: pip install zizmor
      - name: Check workflows
        run: zizmor .
