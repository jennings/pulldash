name: Zizmor

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install zizmor
        run: pip install zizmor
      - name: Check workflows
        run: zizmor .
